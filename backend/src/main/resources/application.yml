server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_matching?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4
    username: ${DB_USERNAME:your_username}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# JWT配置
jwt:
  secret: ${JWT_SECRET:mySecretKeyForCampusMatchingApp}
  expiration: ${JWT_EXPIRATION:86400}  # 24小时 (秒)

# 安全配置
logging:
  level:
    org.springframework.security: DEBUG

